<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube 說明欄查詢</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>YouTube 說明欄查詢</h1>
      <p class="sub">
        關鍵字比對說明欄內的<strong>時間戳</strong>與<strong>超連結</strong>（由管理者同步資料，無需訪客 API
        Key）。
      </p>
    </header>

    <main class="main">
      <div class="toolbar">
        <input
          id="q"
          type="search"
          placeholder="輸入關鍵字…（比對章節標題、連結網址、連結旁文字）"
          autocomplete="off"
        />
        <span id="meta" class="meta"></span>
      </div>
      <p id="err" class="err" hidden></p>
      <div id="results" class="results"></div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
